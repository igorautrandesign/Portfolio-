<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>PI Dashboard · Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,450;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   PI Dashboard — Mobile (390px) · Inter · Light mode
   ============================================================ */
:root{
  --bg:#F4F6F7; --surface:#FFFFFF; --surface-2:#F8FAFA; --surface-3:#EFF3F3;
  --ink:#0E1C18; --ink-2:#4A5852; --ink-3:#79857F; --ink-4:#A4AEA9;
  --line:#E9EDEE; --line-2:#F0F3F3; --line-strong:#DCE2E2;
  --brand:#0A3A32; --brand-700:#0E4A3F; --brand-600:#14604F; --brand-tint:#EAF2EF; --brand-tint-2:#F3F8F6;
  --success:#10B981; --success-d:#0C9268; --success-tint:#E7F7F0;
  --amber:#F59E0B; --amber-d:#CE8108; --amber-tint:#FDF3DE;
  --coral:#EF4444; --coral-d:#D72F2F; --coral-tint:#FCE8E8;
  --info:#1184C4; --info-tint:#E4F1F8;
  --sh-1:0 1px 2px rgba(14,28,24,.04);
  --sh-2:0 1px 3px rgba(14,28,24,.05),0 4px 12px rgba(14,28,24,.04);
  --font:"Inter","Helvetica Neue",Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:auto;}
body{font-family:var(--font);background:transparent;color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;font-feature-settings:"cv05" 1,"ss01" 1;}
.num{font-variant-numeric:tabular-nums;}

.m-app{ max-width:430px; margin:0 auto; padding:0 0 38px; min-height:auto; }

/* ---- header ---- */
.m-head{ position:sticky; top:0; z-index:30; background:rgba(244,246,247,.86); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); padding:10px 16px 10px; display:flex; align-items:center; gap:11px; border-bottom:1px solid var(--line); }
.m-mark{ width:34px;height:34px;border-radius:9px;background:var(--brand);display:grid;place-items:center;flex:none; }
.m-mark svg{width:18px;height:18px;}
.m-htxt{ flex:1; min-width:0; }
.m-htxt h1{ font-size:17px;font-weight:800;letter-spacing:-.02em;margin:0;line-height:1.1; }
.m-htxt .ctx{ font-size:11px;color:var(--brand);font-weight:600;display:block;margin-top:1px; }
.m-live{ display:inline-flex;align-items:center;gap:5px;font-size:9.5px;font-weight:600;color:var(--success-d);background:var(--success-tint);padding:3px 8px;border-radius:100px; }
.m-live .led{ width:5px;height:5px;border-radius:50%;background:var(--success); }
.m-ico{ width:36px;height:36px;border-radius:9px;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;position:relative;flex:none;color:var(--ink-2); }
.m-ico svg{width:17px;height:17px;}
.m-ico .badge{ position:absolute;top:-4px;right:-4px;min-width:15px;height:15px;padding:0 3px;border-radius:100px;background:var(--coral);color:#fff;font-size:9px;font-weight:700;display:grid;place-items:center;border:2px solid var(--bg); }

/* ---- gerência carousel ---- */
.m-tabs{ display:flex;gap:8px;overflow-x:auto;padding:13px 16px 14px;scroll-snap-type:x proximity;scroll-padding-left:16px;-webkit-overflow-scrolling:touch; }
.m-tabs::-webkit-scrollbar{ height:0; }
.m-tabs::after{ content:"";flex:0 0 4px; }
.m-chip{ flex:none;scroll-snap-align:start;display:flex;flex-direction:column;gap:2px;min-width:118px;padding:9px 13px;border-radius:10px;background:var(--surface);border:1px solid var(--line);box-shadow:var(--sh-1);cursor:pointer; }
.m-chip .ct{ display:flex;align-items:center;gap:7px; }
.m-chip .cc{ font-size:9.5px;font-weight:700;color:var(--ink-4);letter-spacing:.04em; }
.m-chip .cn{ font-size:13px;font-weight:600;color:var(--ink-2);letter-spacing:-.01em;white-space:nowrap; }
.m-chip .cd{ width:6px;height:6px;border-radius:50%;margin-left:auto; }
.m-chip .cs{ font-size:10.5px;color:var(--ink-4);white-space:nowrap; }
.m-chip.on{ background:var(--brand);border-color:var(--brand); }
.m-chip.on .cn{ color:#fff; } .m-chip.on .cc{ color:rgba(255,255,255,.55); } .m-chip.on .cs{ color:rgba(255,255,255,.65); }
.st-ok{background:var(--success);} .st-warn{background:var(--amber);} .st-crit{background:var(--coral);}

/* ---- stage / transition ---- */
#mStage{ transition:opacity .26s ease, transform .26s ease; }
#mStage.swap{ opacity:0; transform:translateY(8px); }

/* ---- section label ---- */
.m-sec{ font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin:20px 16px 13px;display:flex;align-items:center;gap:10px; }
.m-sec .ln{ flex:1;height:1px;background:var(--line); }
.m-sec .n{ color:var(--ink-4);font-weight:700; }

/* ---- KPIs 2-col ---- */
.m-kpis{ display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px; }
.m-kpi{ background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh-2);padding:13px 14px 12px;display:flex;flex-direction:column;gap:9px;overflow:hidden; }
.m-kpi.span2{ grid-column:1 / -1; }
.m-kpi .kl{ font-size:10px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:7px; }
.m-kpi .ki{ width:24px;height:24px;border-radius:6px;display:grid;place-items:center;flex:none; }
.m-kpi .ki svg{ width:13px;height:13px; }
.ico-brand{background:var(--brand-tint);color:var(--brand);} .ico-success{background:var(--success-tint);color:var(--success-d);}
.ico-amber{background:var(--amber-tint);color:var(--amber-d);} .ico-info{background:var(--info-tint);color:var(--info);} .ico-coral{background:var(--coral-tint);color:var(--coral-d);}
.m-kpi .kv{ font-size:27px;font-weight:800;letter-spacing:-.03em;line-height:.95;display:flex;align-items:baseline;gap:5px; }
.m-kpi .kv .pre{ font-size:16px;font-weight:700;color:var(--ink-2); }
.m-kpi .kv .u{ font-size:11px;font-weight:500;color:var(--ink-3); }
.m-kpi .kf{ display:flex;align-items:center;gap:8px;flex-wrap:wrap; }
.delta{ display:inline-flex;align-items:center;gap:3px;white-space:nowrap;font-size:11.5px;font-weight:700;line-height:1;padding:4px 9px;border-radius:7px;letter-spacing:-.01em; }
.delta svg{ width:12px;height:12px;flex:none; }
.delta.good{color:var(--success-d);background:var(--success-tint);} .delta.bad{color:var(--coral-d);background:var(--coral-tint);}
.delta.warn{color:var(--amber-d);background:var(--amber-tint);} .delta.flat{color:var(--ink-3);background:var(--surface-3);}
.m-kpi .kc{ font-size:10.5px;color:var(--ink-4); }
.m-kpi .spark{ width:100%;height:34px;display:block; }
.m-kpi .segb{ display:flex;gap:3px;height:7px; } .m-kpi .segb span{ display:block;height:100%;border-radius:3px; }
.m-kpi .segl{ display:flex;flex-wrap:wrap;gap:6px 14px;font-size:10.5px;color:var(--ink-2);font-weight:500; }
.m-kpi .segl i{ width:7px;height:7px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:middle; }

/* ---- panel (level 2/3 cards) ---- */
.m-card{ background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh-2);margin:0 16px;overflow:hidden; }
.m-ph{ padding:16px 16px 13px; }
.m-ph .pt{ font-size:15px;font-weight:700;letter-spacing:-.015em; }
.m-ph .ps{ font-size:11.5px;color:var(--ink-3);margin-top:3px; }
.m-legend{ display:flex;flex-wrap:wrap;gap:8px 16px;padding:0 16px 10px; }
.m-legend .lg{ display:inline-flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink-2);font-weight:500; }
.m-legend .lg .sw{ width:12px;height:12px;border-radius:3px; } .m-legend .lg .ln{ width:16px;border-top:2.5px solid;border-radius:2px; }

/* horizontal scroll chart */
.m-hscroll{ overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 16px 6px;position:relative; }
.m-hscroll::-webkit-scrollbar{ height:5px; } .m-hscroll::-webkit-scrollbar-thumb{ background:var(--line-strong);border-radius:3px; }
.m-hint{ display:flex;align-items:center;justify-content:center;gap:6px;font-size:10.5px;color:var(--ink-4);padding:0 0 12px;font-weight:500; }
.m-hint svg{ width:13px;height:13px; }
.m-foot{ display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line-2);border-top:1px solid var(--line-2); }
.m-foot .sc{ background:var(--surface);padding:12px 16px;display:flex;flex-direction:column;gap:2px; }
.m-foot .sc b{ font-size:16px;font-weight:700;letter-spacing:-.02em; } .m-foot .sc span{ font-size:10px;color:var(--ink-3); }

/* donut vertical */
.m-donut{ display:flex;flex-direction:column;align-items:center;padding:8px 16px 4px;gap:6px; }
.m-donut > svg{ width:128px;height:128px; }
.m-donut .dlbl{ font-size:11px;color:var(--ink-3); } .m-donut .dval{ font-size:16px;font-weight:700;letter-spacing:-.02em; }
.m-complist{ padding:6px 16px 16px; }
.m-comprow{ display:grid;grid-template-columns:10px 1fr auto auto;align-items:center;gap:11px;padding:11px 0;border-top:1px solid var(--line-2);font-size:12.5px; }
.m-comprow:first-child{ border-top:0; }
.m-comprow .dc{ width:9px;height:9px;border-radius:3px; } .m-comprow .nm{ color:var(--ink-2);font-weight:500; }
.m-comprow .vv{ font-weight:600; } .m-comprow .pp{ font-size:11px;color:var(--ink-4);width:38px;text-align:right;font-weight:600; }

/* matrix mobile */
.m-mx{ padding:14px 16px 16px; }
.m-mxplot{ display:grid;grid-template-columns:20px 1fr;gap:9px; }
.m-mxy{ writing-mode:vertical-rl;transform:rotate(180deg);text-align:center;font-size:9.5px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em; }
.m-mxgrid{ display:grid;grid-template-columns:54px 1fr 1fr 1fr;gap:7px; }
.m-mxrl{ display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:11px;font-weight:600;color:var(--ink-2); }
.m-mxcell{ min-height:58px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border:1px solid transparent; }
.m-mxcell b{ font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1; } .m-mxcell span{ font-size:8.5px;font-weight:700;text-transform:uppercase;opacity:.8; }
.m-mxcl{ font-size:10.5px;font-weight:600;color:var(--ink-2);text-align:center; }
.m-mxx{ grid-column:2 / -1;text-align:center;font-size:9.5px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;padding-top:8px; }
.mx-z-low{background:var(--success-tint);color:var(--success-d);border-color:rgba(16,185,129,.2);}
.mx-z-mid{background:var(--amber-tint);color:var(--amber-d);border-color:rgba(245,158,11,.22);}
.mx-z-high{background:var(--coral-tint);color:var(--coral-d);border-color:rgba(239,68,68,.22);}
.m-mxscale{ display:flex;flex-wrap:wrap;gap:10px 14px;padding:14px 0 0 30px; }
.m-mxscale span{ display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-2);font-weight:500; } .m-mxscale i{ width:10px;height:10px;border-radius:3px; }

/* bad actors vertical cards */
.m-bt{ padding:12px 16px 16px;display:flex;flex-direction:column;gap:10px; }
.m-btc{ border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:var(--surface-2); }
.m-bttop{ display:flex;align-items:center;gap:11px; }
.m-btr{ width:24px;height:24px;border-radius:7px;background:var(--surface-3);color:var(--ink-2);font-weight:700;font-size:12px;display:grid;place-items:center;flex:none; }
.m-btn{ flex:1;min-width:0; } .m-btn b{ font-size:13.5px;font-weight:600;display:block; } .m-btn span{ font-size:11px;color:var(--ink-4); }
.m-btv{ text-align:right;flex:none; } .m-btv b{ font-size:14px;font-weight:700;letter-spacing:-.02em; } .m-btv span{ font-size:10px;color:var(--ink-4);display:block; }
.m-btbar{ margin-top:9px;height:5px;border-radius:3px;background:var(--surface-3);overflow:hidden; } .m-btbar i{ display:block;height:100%;border-radius:3px; }

.m-note{ padding:2px 16px 16px;font-size:11.5px;color:var(--ink-3);display:flex;align-items:center;gap:8px; } .m-note .dot{ width:7px;height:7px;border-radius:50%;background:var(--success); }

/* gantt mobile — sticky first column */
.m-gantt{ overflow:hidden; }
.m-gchips{ display:flex;flex-wrap:wrap;gap:7px;padding:0 16px 12px; }
.m-gchip{ display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:600;color:var(--ink-2);padding:5px 9px;border-radius:7px;border:1px solid var(--line); }
.m-gchip .ct{ width:7px;height:7px;border-radius:2px; }
.mg-scroll{ overflow-x:auto;-webkit-overflow-scrolling:touch;border-top:1px solid var(--line); }
.mg-scroll::-webkit-scrollbar{ height:5px; } .mg-scroll::-webkit-scrollbar-thumb{ background:var(--line-strong);border-radius:3px; }
.mg-inner{ --lab:148px; min-width:600px; }
.mg-head{ display:grid;grid-template-columns:var(--lab) 1fr;background:var(--surface-2);border-bottom:1px solid var(--line); }
.mg-corner{ position:sticky;left:0;z-index:3;background:var(--surface-2);padding:9px 14px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);border-right:1px solid var(--line); }
.mg-months{ display:grid;grid-template-columns:repeat(4,1fr); }
.mg-month{ padding:8px 0 7px 10px;font-size:10.5px;font-weight:600;color:var(--ink-2);border-right:1px solid var(--line-2); } .mg-month:last-child{border-right:0;} .mg-month span{ font-size:9px;color:var(--ink-4);display:block; }
.mg-row{ display:grid;grid-template-columns:var(--lab) 1fr;border-top:1px solid var(--line-2);position:relative; } .mg-row:first-child{border-top:0;}
.mg-lab{ position:sticky;left:0;z-index:2;background:var(--surface);padding:0 12px;border-right:1px solid var(--line);display:flex;align-items:center;gap:9px;min-height:50px; }
.mg-lab .gi{ width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:none; } .mg-lab .gi svg{ width:13px;height:13px; }
.mg-lab .gt b{ font-size:12px;font-weight:600;display:block;line-height:1.2; } .mg-lab .gt span{ font-size:10px;color:var(--ink-4); }
.mg-track{ position:relative;min-height:50px; }
.mg-bar{ position:absolute;top:50%;transform:translateY(-50%);height:18px;border-radius:5px;display:flex;overflow:hidden;box-shadow:var(--sh-1); }
.gseg{ height:100%; }
.gseg-done{background:var(--success);} .gseg-prog{background:repeating-linear-gradient(135deg,var(--brand-600),var(--brand-600) 6px,var(--brand-700) 6px,var(--brand-700) 12px);}
.gseg-warn{background:var(--amber);} .gseg-late{background:repeating-linear-gradient(135deg,var(--coral),var(--coral) 6px,var(--coral-d) 6px,var(--coral-d) 12px);} .gseg-plan{background:var(--surface-3);border:1px dashed var(--line-strong);}
.mg-pct{ position:absolute;right:0;top:50%;transform:translate(calc(100% + 8px),-50%);font-size:10px;font-weight:600;color:var(--ink-3);white-space:nowrap; } .mg-pct.bad{color:var(--coral-d);}
.mg-mile{ position:absolute;top:50%;width:13px;height:13px;transform:translate(-50%,-50%) rotate(45deg);border-radius:3px;background:var(--brand);z-index:1; }
.mg-today{ position:absolute;top:0;bottom:0;width:2px;background:var(--brand);z-index:2; }

.m-footnote{ padding:22px 16px 8px;font-size:10.5px;color:var(--ink-4);text-align:center; }

/* ============================================================
   HORIZONTAL LAYOUT — economiza espaço vertical
   ============================================================ */

/* donut horizontal: gráfico à esq, dados à dir */
.m-donut-h{ display:flex; align-items:center; gap:16px; padding:12px 16px 4px; }
.m-donut-h > svg{ width:108px; height:108px; flex:none; }
.m-donut-h .d-info{ flex:1; min-width:0; display:flex; flex-direction:column; gap:4px; }
.m-donut-h .dlbl{ font-size:10px; color:var(--ink-3); }
.m-donut-h .dval{ font-size:15px; font-weight:700; letter-spacing:-.02em; }

/* KPI span2 horizontal: número à esq, spark/seg à dir */
.m-kpi.span2.kpi-h{ flex-direction:row; align-items:center; gap:14px; }
.m-kpi.span2.kpi-h .kpi-left{ flex:1; min-width:0; display:flex; flex-direction:column; gap:6px; }
.m-kpi.span2.kpi-h .kpi-right{ flex:0 0 110px; display:flex; flex-direction:column; gap:6px; }
.m-kpi.span2.kpi-h .spark{ width:100%; height:38px; }

/* ============================================================
   IPHONE MOCKUP
   ============================================================ */
body.mockup-mode {
  min-height: unset;
  height: 858px; /* 826px shell + 16px topo + 16px base */
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 0;

  background: transparent;
  position: relative;
}



/* garantir que o shell fique acima do grain */
.iphone-shell {
  position: relative;
  z-index: 1;
}
.iphone-shell { position:relative; width:393px; flex:none; }
.iphone-body {
  position:relative; width:393px;
  background:#1C1C1E; border-radius:54px;
  box-shadow: 0 0 0 1.5px #3a3a3c, 0 0 0 3px #2c2c2e,
    0 30px 80px rgba(0,0,0,.7), 0 10px 30px rgba(0,0,0,.4),
    inset 0 0 0 1px rgba(255,255,255,.08);
  padding:16px;
}
.iphone-screen { border-radius:40px; overflow:hidden; background:#F4F6F7; position:relative; height:760px; }
.iphone-scroll { width:100%; height:100%; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; scrollbar-width:thin; scrollbar-color:rgba(14,28,24,.22) transparent; }
.iphone-scroll::-webkit-scrollbar { width:3px; }
.iphone-scroll::-webkit-scrollbar-track { background:transparent; }
.iphone-scroll::-webkit-scrollbar-thumb { background:rgba(14,28,24,.22); border-radius:3px; }
.dynamic-island {
  position:absolute; top:14px; left:50%; transform:translateX(-50%);
  width:120px; height:34px; background:#1C1C1E; border-radius:20px;
  z-index:100; box-shadow:0 0 0 1px rgba(255,255,255,.06);
}
.iphone-statusbar {
  height:59px; background:rgba(244,246,247,.95);
  display:flex; align-items:flex-end; justify-content:space-between;
  padding:0 28px 10px; position:sticky; top:0; z-index:50; flex:none;
}
.iphone-statusbar .time { font-size:15px; font-weight:600; color:var(--ink); letter-spacing:-.02em; }
.iphone-statusbar .icons { display:flex; align-items:center; gap:6px; }
.btn-side { position:absolute; background:#2c2c2e; border-radius:3px; box-shadow:inset 0 0 0 .5px rgba(255,255,255,.1); }
.btn-side.vol-up { left:-4px; top:140px; width:4px; height:38px; }
.btn-side.vol-dn { left:-4px; top:192px; width:4px; height:38px; }
.btn-side.silent  { left:-4px; top:96px; width:4px; height:28px; }
.btn-side.power   { right:-4px; top:156px; width:4px; height:64px; }
.iphone-home { height:34px; display:flex; align-items:center; justify-content:center; flex:none; }
.iphone-home-bar { width:134px; height:5px; background:var(--ink); border-radius:3px; opacity:.2; }

/* ---- section accordions (progressive disclosure) ---- */
.m-accs-h{ width:calc(100% - 32px); margin:20px 16px 13px; padding:0; border:0; background:transparent; cursor:pointer; display:flex; align-items:center; gap:10px; font-family:var(--font); }
.m-accs-h .nm{ font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-3); }
.m-accs-h .ln{ flex:1; height:1px; background:var(--line); }
.m-accs-h .n{ font-size:11px; font-weight:700; color:var(--ink-4); }
.m-accs-h .chev{ width:17px; height:17px; color:var(--ink-3); flex:none; transition:transform .3s ease; }
.m-accs.open .m-accs-h .chev{ transform:rotate(180deg); }
.m-acc-b{ display:grid; grid-template-rows:0fr; transition:grid-template-rows .3s ease; }
.m-accs.open .m-acc-b{ grid-template-rows:1fr; }
.m-acc-inner{ overflow:hidden; min-height:0; }
.m-acc-inner #mSide{ display:block; margin-top:14px; }

/* ---- gantt → milestone list (mobile) ---- */
.m-mscap{ padding:0 16px 12px;font-size:11.5px;color:var(--ink-3);display:flex;align-items:center;gap:8px;font-weight:500; }
.m-mscap .pchip{ font-size:10px;font-weight:700;color:var(--brand);background:var(--brand-tint);padding:3px 9px;border-radius:100px;letter-spacing:.02em; }
.m-mslist{ padding:2px 16px 14px;border-top:1px solid var(--line); }
.m-ms{ display:grid;grid-template-columns:20px 1fr;gap:13px; }
.m-ms-rail{ position:relative;display:flex;justify-content:center; }
.m-ms-rail::before{ content:"";position:absolute;top:0;bottom:0;width:2px;background:var(--line);border-radius:2px; }
.m-ms:first-child .m-ms-rail::before{ top:24px; }
.m-ms:last-child .m-ms-rail::before{ bottom:auto;height:24px; }
.m-ms-dot{ position:relative;z-index:1;width:13px;height:13px;border-radius:50%;margin-top:18px;border:3px solid var(--surface);box-shadow:0 0 0 1px var(--line); }
.m-ms-card{ padding:13px 0 15px;min-width:0; }
.m-ms-top{ display:flex;align-items:center;gap:9px;justify-content:space-between; }
.m-ms-tt{ display:flex;align-items:center;gap:9px;min-width:0; }
.m-ms-ico{ width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:none; } .m-ms-ico svg{ width:13px;height:13px; }
.m-ms-tt b{ font-size:13px;font-weight:600;letter-spacing:-.01em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.m-ms-badge{ flex:none;font-size:9px;font-weight:700;padding:3px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap; }
.b-done{ background:var(--success-tint);color:var(--success-d); } .b-prog{ background:var(--brand-tint);color:var(--brand); }
.b-warn{ background:var(--amber-tint);color:var(--amber-d); } .b-late{ background:var(--coral-tint);color:var(--coral-d); } .b-plan{ background:var(--surface-3);color:var(--ink-3); }
.m-ms-meta{ font-size:11px;color:var(--ink-4);margin:6px 0 0 35px; }
.m-ms-prog{ display:flex;align-items:center;gap:10px;margin:9px 0 0 35px; }
.m-ms-prog .bar{ flex:1;height:5px;border-radius:3px;background:var(--surface-3);overflow:hidden; } .m-ms-prog .bar i{ display:block;height:100%;border-radius:3px; }
.m-ms-prog .pct{ font-size:11px;font-weight:600;color:var(--ink-3);white-space:nowrap; } .m-ms-prog .pct.bad{ color:var(--coral-d); }

    const cum=new Array(n).fill(L.min);
    cfg.series.forEach((s,si)=>{const col=baseColor(s.color),top=s.data.map((v,i)=>cum[i]+v),bot=cum.slice();
      let pth=`M${X(0).toFixed(1)} ${yL(top[0]).toFixed(1)} `+top.map((v,i)=>`L${X(i).toFixed(1)} ${yL(v).toFixed(1)}`).join(" ")+" "+bot.map((v,i)=>`L${X(n-1-i).toFixed(1)} ${yL(bot[n-1-i]).toFixed(1)}`).join(" ")+" Z";
      const id="a"+si,g=el("linearGradient",{id,x1:0,y1:0,x2:0,y2:1});g.appendChild(el("stop",{offset:0,"stop-color":col,"stop-opacity":.42}));g.appendChild(el("stop",{offset:1,"stop-color":col,"stop-opacity":.12}));const df=el("defs");df.appendChild(g);svg.appendChild(df);
      svg.appendChild(el("path",{d:pth,fill:`url(#${id})`}));let ld="";top.forEach((v,i)=>ld+=(i?"L":"M")+X(i).toFixed(1)+" "+yL(v).toFixed(1)+" ");svg.appendChild(el("path",{d:ld.trim(),fill:"none",stroke:col,"stroke-width":2.2,"stroke-linejoin":"round"}));for(let i=0;i<n;i++)cum[i]=top[i];});
    const step=(n-1)/(cfg.xcats.length-1);cfg.xcats.forEach((c,k)=>{const i=Math.round(k*step);const t=el("text",{x:X(i),y:h-8,"text-anchor":"middle",fill:C("--ink-3"),"font-size":10});t.textContent=c;svg.appendChild(t);});
  }
  function mainArea(d){
    const cfg=d.main;
    return `<div class="m-card">${ph(cfg.title,cfg.sub)}
      <div class="m-legend">${cfg.series.map(s=>`<span class="lg"><span class="sw" style="background:${baseColor(s.color)}"></span>${s.label}</span>`).join("")}</div>
      <div class="m-hscroll"><svg style="width:520px;height:238px;display:block"></svg></div>${hint}${foot(cfg.foot)}</div>`;
  }

  /* ---- matrix ---- */
  function mainMatrix(d){
    const cfg=d.main;const zone=(r,c)=>{const s=(2-r)+c;return s<=1?"low":s===2?"mid":s===3&&c<2?"mid":"high";};
    let g="";cfg.cells.forEach((row,r)=>{g+=`<div class="m-mxrl">${cfg.ycats[r]}</div>`;row.forEach((v,c)=>{g+=`<div class="m-mxcell mx-z-${zone(r,c)}"><b class="num">${v}</b><span>O.S.</span></div>`;});});
    g+=`<div></div>`+cfg.xcats.map(x=>`<div class="m-mxcl">${x}</div>`).join("")+`<div class="m-mxx">${cfg.xlabel} →</div>`;
    return `<div class="m-card">${ph(cfg.title,cfg.sub)}
      <div class="m-mx"><div class="m-mxplot"><div class="m-mxy">${cfg.ylabel} ↑</div><div class="m-mxgrid">${g}</div></div>
      <div class="m-mxscale"><span><i style="background:var(--success)"></i>Controlado</span><span><i style="background:var(--amber)"></i>Atenção</span><span><i style="background:var(--coral)"></i>Crítico</span></div></div>
      ${foot(cfg.foot)}</div>`;
  }

  /* ---- sankey ---- */
  function drawSankey(svg,cfg,w,h){
    svg.setAttribute("viewBox",`0 0 ${w} ${h}`);svg.innerHTML="";
    const mT=24,mB=12,pH=h-mT-mB,srcX=12,nodeW=18,srcR=srcX+nodeW,labelW=150,destX=w-labelW-nodeW,n=cfg.flows.length,gap=11,availH=pH-gap*(n-1),midx=(srcR+destX)/2;
    svg.appendChild(el("rect",{x:srcX,y:mT,width:nodeW,height:pH,rx:4,fill:C("--brand")}));
    const sl=el("text",{x:srcX,y:mT-9,fill:C("--ink"),"font-size":11,"font-weight":700});sl.textContent=cfg.source.label.toUpperCase();svg.appendChild(sl);
    let sy=mT,dy=mT;
    cfg.flows.forEach(f=>{const sh=f.pct/100*pH,dh=f.pct/100*availH,col=baseColor(f.color),sy0=sy,sy1=sy+sh,dy0=dy,dy1=dy+dh;
      svg.appendChild(el("path",{d:`M${srcR} ${sy0.toFixed(1)} C${midx} ${sy0.toFixed(1)} ${midx} ${dy0.toFixed(1)} ${destX} ${dy0.toFixed(1)} L${destX} ${dy1.toFixed(1)} C${midx} ${dy1.toFixed(1)} ${midx} ${sy1.toFixed(1)} ${srcR} ${sy1.toFixed(1)} Z`,fill:col,"fill-opacity":.42}));
      svg.appendChild(el("rect",{x:destX,y:dy0,width:nodeW,height:dh,rx:3,fill:col}));
      const mid=(dy0+dy1)/2;const nm=el("text",{x:destX+nodeW+10,y:mid-2,fill:C("--ink"),"font-size":11.5,"font-weight":600});nm.textContent=f.label;svg.appendChild(nm);
      const vv=el("text",{x:destX+nodeW+10,y:mid+13,fill:C("--ink-3"),"font-size":10});vv.textContent=`${f.pct}% · ${f.val}`;svg.appendChild(vv);
      sy=sy1;dy=dy1+gap;});
  }
  function mainSankey(d){const cfg=d.main;return `<div class="m-card">${ph(cfg.title,cfg.sub)}<div class="m-hscroll"><svg style="width:540px;height:268px;display:block"></svg></div>${hint}${foot(cfg.foot)}</div>`;}

  /* ---- side: donut ---- */
  function sideDonut(d){const dd=d.donut;return `<div class="m-card">${ph(dd.title,dd.sub)}
    <div class="m-donut-h">
      <svg></svg>
      <div class="d-info">
        <span class="dlbl">${dd.sideLbl}</span>
        <span class="dval num">${dd.sideVal}</span>
        <span class="delta ${dd.delta.tone}" style="margin-top:4px">${dd.delta.dir==="up"?arrU:arrD}${dd.delta.val}</span>
      </div>
    </div>
    <div class="m-complist">${dd.segs.map(s=>`<div class="m-comprow"><span class="dc" style="background:var(--${s.color})"></span><span class="nm">${s.nm}</span><span class="vv num">${s.vv}</span><span class="pp num">${s.pp}%</span></div>`).join("")}</div></div>`;}
  function drawDonut(svg,dd){const cx=64,cy=64,r=48,sw=18,circ=2*Math.PI*r;svg.setAttribute("viewBox","0 0 128 128");svg.innerHTML="";svg.appendChild(el("circle",{cx,cy,r,fill:"none",stroke:C("--surface-3"),"stroke-width":sw}));let off=0;dd.segs.forEach(s=>{const len=s.pp/100*circ;svg.appendChild(el("circle",{cx,cy,r,fill:"none",stroke:C("--"+s.color),"stroke-width":sw,"stroke-dasharray":`${len-2} ${circ-len+2}`,"stroke-dashoffset":-off,transform:`rotate(-90 ${cx} ${cy})`}));off+=len;});const t1=el("text",{x:cx,y:cy-1,"text-anchor":"middle",fill:C("--ink"),"font-size":22,"font-weight":800});t1.textContent=dd.center;svg.appendChild(t1);const t2=el("text",{x:cx,y:cy+15,"text-anchor":"middle",fill:C("--ink-3"),"font-size":10});t2.textContent=dd.centerSub;svg.appendChild(t2);}

  /* ---- side: table (bad actors) ---- */
  function sideTable(d){const s=d.side;return `<div class="m-card">${ph(s.title,s.sub)}
    <div class="m-bt">${s.rows.map((r,i)=>`<div class="m-btc"><div class="m-bttop"><span class="m-btr">${i+1}</span><span class="m-btn"><b>${r.nm}</b><span>${r.sub}</span></span><span class="m-btv"><b class="num">${r.val}</b><span>${r.h}</span></span></div><div class="m-btbar"><i style="width:${r.bar}%;background:var(--${r.tone})"></i></div></div>`).join("")}</div></div>`;}

  /* ---- side: groupbars ---- */
  function sideGroup(d){const cfg=d.side;return `<div class="m-card">${ph(cfg.title,cfg.sub)}
    <div class="m-legend">${cfg.series.map(s=>`<span class="lg"><span class="sw" style="background:${baseColor(s.color)}"></span>${s.label}</span>`).join("")}</div>
    <div style="padding:0 12px 4px"><svg class="gbsvg" style="width:100%;height:200px;display:block"></svg></div>
    <div class="m-note"><span class="dot"></span>${cfg.note}</div></div>`;}
  function drawGroup(svg,cfg){const w=svg.clientWidth||340,h=200;svg.setAttribute("viewBox",`0 0 ${w} ${h}`);svg.innerHTML="";const mL=34,mR=10,mT=10,mB=24,pW=w-mL-mR,pH=h-mT-mB,L=cfg.left;const yL=v=>mT+pH-(v-L.min)/(L.max-L.min)*pH,line=C("--line"),line2=C("--line-2"),ink4=C("--ink-4");
    for(let v=L.min;v<=L.max;v+=L.step){const yy=yL(v);svg.appendChild(el("line",{x1:mL,y1:yy,x2:w-mR,y2:yy,stroke:v===L.min?line:line2,"stroke-width":1}));const t=el("text",{x:mL-7,y:yy+4,"text-anchor":"end",fill:ink4,"font-size":9.5});t.textContent=v;svg.appendChild(t);}
    const nc=cfg.cats.length,slot=pW/nc,ns=cfg.series.length,bw=Math.min(15,slot*.26),gap=4,gW=bw*ns+gap*(ns-1);
    cfg.cats.forEach((cat,ci)=>{const cx=mL+(ci+.5)*slot;cfg.series.forEach((s,si)=>{const x=cx-gW/2+si*(bw+gap),by=yL(s.data[ci]);svg.appendChild(el("rect",{x,y:by,width:bw,height:mT+pH-by,rx:2.5,fill:baseColor(s.color)}));});const t=el("text",{x:cx,y:h-8,"text-anchor":"middle",fill:C("--ink-3"),"font-size":10});t.textContent=cat;svg.appendChild(t);});}

  /* ---- side: radar ---- */
  function sideRadar(d){const cfg=d.side;return `<div class="m-card">${ph(cfg.title,cfg.sub)}
    <div style="padding:4px 10px 0"><svg class="rdsvg" style="width:100%;height:240px;display:block"></svg></div>
    <div class="m-note"><span class="dot"></span>${cfg.note}</div></div>`;}
  function drawRadar(svg,cfg){const w=svg.clientWidth||340,h=240;svg.setAttribute("viewBox",`0 0 ${w} ${h}`);svg.innerHTML="";const cx=w/2,cy=h/2-2,R=76,n=cfg.axes.length,ang=i=>-Math.PI/2+i*2*Math.PI/n,pt=(i,rad)=>[cx+rad*Math.cos(ang(i)),cy+rad*Math.sin(ang(i))];
    [0.25,0.5,0.75,1].forEach(f=>{let p="";for(let i=0;i<n;i++){const[x,y]=pt(i,R*f);p+=(i?"L":"M")+x.toFixed(1)+" "+y.toFixed(1)+" ";}p+="Z";svg.appendChild(el("path",{d:p,fill:"none",stroke:C("--line"),"stroke-width":1}));});
    for(let i=0;i<n;i++){const[x,y]=pt(i,R);svg.appendChild(el("line",{x1:cx,y1:cy,x2:x,y2:y,stroke:C("--line-2"),"stroke-width":1}));}
    let np="";for(let i=0;i<n;i++){const[x,y]=pt(i,R*cfg.norma/100);np+=(i?"L":"M")+x.toFixed(1)+" "+y.toFixed(1)+" ";}np+="Z";svg.appendChild(el("path",{d:np,fill:"none",stroke:C("--amber-d"),"stroke-width":1.5,"stroke-dasharray":"4 3"}));
    const col=baseColor(cfg.series.color);let sp="";for(let i=0;i<n;i++){const[x,y]=pt(i,R*cfg.series.data[i]/100);sp+=(i?"L":"M")+x.toFixed(1)+" "+y.toFixed(1)+" ";}sp+="Z";svg.appendChild(el("path",{d:sp,fill:col,"fill-opacity":.16,stroke:col,"stroke-width":2,"stroke-linejoin":"round"}));for(let i=0;i<n;i++){const[x,y]=pt(i,R*cfg.series.data[i]/100);svg.appendChild(el("circle",{cx:x,cy:y,r:2.8,fill:"#fff",stroke:col,"stroke-width":1.8}));}
    for(let i=0;i<n;i++){const[x,y]=pt(i,R+13),a=ang(i),anchor=Math.abs(Math.cos(a))<.3?"middle":(Math.cos(a)>0?"start":"end");const t=el("text",{x:x.toFixed(1),y:(y+3).toFixed(1),"text-anchor":anchor,fill:C("--ink-2"),"font-size":9,"font-weight":600});t.textContent=cfg.axes[i];svg.appendChild(t);}}

  /* ---- gantt → milestone list ---- */
  const monthAt=p=>p<25?"Mai":p<50?"Jun":p<75?"Jul":"Ago";
  function rowStatus(rw){
    const s=rw.bar.segs, pct=rw.bar.pct;
    if(s.some(x=>x.t==="late")) return {cls:"b-late",label:"Atrasado",dot:"var(--coral)",fill:"coral"};
    if(s.length&&s.every(x=>x.t==="plan")) return {cls:"b-plan",label:"Planejado",dot:"var(--surface-3)",fill:"line-strong"};
    if(/^100%/.test(pct)) return {cls:"b-done",label:"Concluído",dot:"var(--success)",fill:"success"};
    if(s.some(x=>x.t==="warn")) return {cls:"b-warn",label:"Atenção",dot:"var(--amber)",fill:"amber"};
    return {cls:"b-prog",label:"Em execução",dot:"var(--brand)",fill:"brand"};
  }
  function fillOf(rw){
    const m=rw.bar.pct.match(/^(\d+)%/); if(m) return +m[1];
    if(/planejado/i.test(rw.bar.pct)) return 0;
    const done=rw.bar.segs.filter(x=>x.t==="done").reduce((a,x)=>a+x.w,0);
    const prog=rw.bar.segs.filter(x=>x.t==="prog").reduce((a,x)=>a+x.w,0);
    return Math.min(100,Math.round(done+prog*0.5));
  }
  function renderGantt(g){
    const items=g.rows.map(rw=>{
      const st=rowStatus(rw), fill=fillOf(rw);
      const start=monthAt(rw.bar.left), end=monthAt(Math.min(rw.bar.left+rw.bar.width,99));
      const period=start===end?start:start+" – "+end;
      return `<div class="m-ms">
        <div class="m-ms-rail"><span class="m-ms-dot" style="background:${st.dot}"></span></div>
        <div class="m-ms-card">
          <div class="m-ms-top"><span class="m-ms-tt"><span class="m-ms-ico ico-${rw.tone}">${svgIco(rw.ico)}</span><b>${rw.title}</b></span><span class="m-ms-badge ${st.cls}">${st.label}</span></div>
          <div class="m-ms-meta">${rw.sub} · ${period} · resp. ${rw.own}</div>
          <div class="m-ms-prog"><div class="bar"><i style="width:${fill}%;background:var(--${st.fill})"></i></div><span class="pct${rw.bar.pctBad?' bad':''}">${rw.bar.pct}</span></div>
        </div>
      </div>`;
    }).join("");
    document.getElementById("mGantt").innerHTML=`${ph(g.title,g.sub)}
      <div class="m-mscap"><span class="pchip">Mai – Ago 2026</span>${g.rows.length} marcos operacionais</div>
      <div class="m-mslist">${items}</div>`;
  }

  /* ---- orchestration ---- */
  const MAIN={combo:mainCombo,area:mainArea,matrix:mainMatrix,sankey:mainSankey};
  const SIDE={donut:sideDonut,table:sideTable,groupbars:sideGroup,radar:sideRadar};

  function draw(d){
    // post-inject SVG drawing for whichever type rendered
    const mt=(d.main&&d.main.type)||"combo", st=(d.side&&d.side.type)||"donut";
    const mainCard=document.getElementById("mMain"), sideCard=document.getElementById("mSide");
    if(mt==="combo") drawCombo(mainCard.querySelector("svg"),d.chart,560,248);
    else if(mt==="area") drawArea(mainCard.querySelector("svg"),d.main,520,238);
    else if(mt==="sankey") drawSankey(mainCard.querySelector("svg"),d.main,540,268);
    if(st==="donut") drawDonut(sideCard.querySelector(".m-donut-h svg, .m-donut svg"),d.donut);
    else if(st==="groupbars") drawGroup(sideCard.querySelector(".gbsvg"),d.side);
    else if(st==="radar") drawRadar(sideCard.querySelector(".rdsvg"),d.side);
  }

  let CURD=null;
  function renderAll(key){
    const d=window.DATA[key]; CURD=d;
    renderTabs(key);
    document.querySelector(".m-htxt .ctx").textContent=d.context;
    renderKpis(d.kpis);
    const mt=(d.main&&d.main.type)||"combo", st=(d.side&&d.side.type)||"donut";
    document.getElementById("mAcc").innerHTML=`
      <section class="m-accs open" id="acc2">
        <button class="m-accs-h" type="button"><span class="nm">Análise Central</span><span class="ln"></span><span class="n">02</span>${chevAcc}</button>
        <div class="m-acc-b"><div class="m-acc-inner"><div id="mMain"></div><div id="mSide"></div></div></div>
      </section>
      <section class="m-accs" id="acc3">
        <button class="m-accs-h" type="button"><span class="nm">Linha do Tempo</span><span class="ln"></span><span class="n">03</span>${chevAcc}</button>
        <div class="m-acc-b"><div class="m-acc-inner"><section class="m-card m-gantt" id="mGantt"></section></div></div>
      </section>`;
    document.getElementById("mMain").innerHTML=(MAIN[mt]||mainCombo)(d);
    document.getElementById("mSide").innerHTML=(SIDE[st]||sideDonut)(d);
    renderGantt(d.gantt);
    draw(d);
    wireTabs();
    wireAcc();
  }
  function wireAcc(){
    document.querySelectorAll(".m-accs-h").forEach(h=>h.addEventListener("click",()=>{
      const sec=h.closest(".m-accs"), wasOpen=sec.classList.contains("open");
      sec.classList.toggle("open");
      if(!wasOpen && CURD) setTimeout(()=>draw(CURD),300);
    }));
  }
  function scrollChip(c, smooth){
    const tabs=document.getElementById("mTabs");
    const idx=[...tabs.children].indexOf(c);
    const beh=smooth?"smooth":"auto";
    if(idx<=1){ tabs.scrollTo({left:0,behavior:beh}); }
    else { c.scrollIntoView({inline:"center",block:"nearest",behavior:beh}); }
  }
  function wireTabs(){
    document.querySelectorAll(".m-chip").forEach(c=>c.addEventListener("click",()=>{
      const k=c.getAttribute("data-g"); if(!window.DATA[k]||c.classList.contains("on"))return;
      const stage=document.getElementById("mStage"); stage.classList.add("swap");
      scrollChip(c, true);
      setTimeout(()=>{renderAll(k);stage.classList.remove("swap");},230);
    }));
  }
  function init(){
    const p=new URLSearchParams(location.search).get("g");
    const key=(p&&window.DATA[p])?p:(document.body.getAttribute("data-g")||"g1");
    renderAll(key);
    // posiciona a aba ativa respeitando o padding lateral
    const on=document.querySelector(".m-chip.on"); if(on) scrollChip(on, false);
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init); else init();
})();

</script>
</body>
