<style>
/* ── INTERFACE ORIGINAL ── */

/* ============================================================
   PI Dashboard v2 — Energia, Combustíveis & Logística
   Light mode · Inter · generous white space · low noise
   ============================================================ */

:root {
  /* Surfaces */
  --bg:        #F4F6F7;
  --surface:   #FFFFFF;
  --surface-2: #F8FAFA;
  --surface-3: #EFF3F3;

  /* Ink */
  --ink:       #0E1C18;
  --ink-2:     #4A5852;
  --ink-3:     #79857F;
  --ink-4:     #A4AEA9;

  /* Lines (lighter / fewer) */
  --line:      #E9EDEE;
  --line-2:    #F0F3F3;
  --line-strong: #DCE2E2;

  /* Brand */
  --brand:     #0A3A32;
  --brand-700: #0E4A3F;
  --brand-600: #14604F;
  --brand-tint:#EAF2EF;
  --brand-tint-2:#F3F8F6;

  /* Status */
  --success:   #10B981;
  --success-d: #0C9268;
  --success-tint:#E7F7F0;
  --amber:     #F59E0B;
  --amber-d:   #CE8108;
  --amber-tint:#FDF3DE;
  --coral:     #EF4444;
  --coral-d:   #D72F2F;
  --coral-tint:#FCE8E8;
  --info:      #1184C4;
  --info-tint: #E4F1F8;

  /* Shadows — extra soft */
  --sh-1: 0 1px 2px rgba(14,28,24,.04);
  --sh-2: 0 1px 3px rgba(14,28,24,.05), 0 6px 16px rgba(14,28,24,.04);
  --sh-3: 0 10px 30px rgba(14,28,24,.08);
  --sh-pop: 0 14px 38px rgba(14,28,24,.16), 0 3px 8px rgba(14,28,24,.10);

  --r-sm: 6px;
  --r:    8px;
  --r-lg: 12px;

  --font: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow-x: hidden;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-size: 14px;
  line-height: 1.5;
  font-feature-settings: "cv05" 1, "ss01" 1;
}
.num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }

.shell {
  max-width: 1680px;
  margin: 0 auto;
  padding: 32px 40px 64px;
  min-width: 0;
  width: 100%;
}

/* ============================ HEADER ============================ */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 28px; padding-bottom: 26px;
}
.brand-block { display: flex; align-items: center; gap: 16px; }
.brand-mark {
  width: 42px; height: 42px; border-radius: 10px;
  background: var(--brand); display: grid; place-items: center;
  box-shadow: var(--sh-2); position: relative; flex: none;
}
.brand-mark::after { content: ""; position: absolute; inset: 0; border-radius: 10px; box-shadow: inset 0 1px 0 rgba(255,255,255,.16); }
.brand-mark svg { width: 22px; height: 22px; }
.title-wrap h1 { font-size: 25px; font-weight: 800; letter-spacing: -.025em; margin: 0; line-height: 1.05; }
.title-wrap .crumb { display: flex; align-items: center; gap: 9px; font-size: 12.5px; color: var(--ink-3); margin-top: 5px; font-weight: 450; }
.title-wrap .crumb .ctx { color: var(--ink-2); font-weight: 600; }
.title-wrap .crumb .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-4); }
.live-pill {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 11px; font-weight: 600; color: var(--success-d); letter-spacing: .02em;
  padding: 4px 10px 4px 8px; border-radius: 100px; background: var(--success-tint);
}
.live-pill .led { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2.6s ease-out infinite; }
@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(16,185,129,.45);} 70%{box-shadow:0 0 0 6px rgba(16,185,129,0);} 100%{box-shadow:0 0 0 0 rgba(16,185,129,0);} }

.tools { display: flex; align-items: center; gap: 12px; }
.search {
  display: flex; align-items: center; gap: 10px; background: var(--surface);
  border: 1px solid var(--line); border-radius: var(--r); padding: 0 14px; height: 42px; width: 300px;
  box-shadow: var(--sh-1); transition: border-color .15s, box-shadow .15s;
}
.search:focus-within { border-color: var(--brand-600); box-shadow: 0 0 0 3px var(--brand-tint); }
.search svg { width: 16px; height: 16px; color: var(--ink-4); flex: none; }
.search input { border: 0; outline: 0; background: transparent; width: 100%; font-family: var(--font); font-size: 13.5px; color: var(--ink); }
.search input::placeholder { color: var(--ink-4); }
.search kbd { font-size: 10.5px; color: var(--ink-3); border: 1px solid var(--line-strong); border-radius: 5px; padding: 2px 6px; background: var(--surface-2); flex: none; font-family: var(--font); font-weight: 500; }
.icon-btn {
  width: 42px; height: 42px; border-radius: var(--r); background: var(--surface);
  border: 1px solid var(--line); display: grid; place-items: center; cursor: pointer; position: relative;
  box-shadow: var(--sh-1); color: var(--ink-2); transition: background .15s, color .15s;
}
.icon-btn:hover { background: var(--surface-2); color: var(--ink); }
.icon-btn svg { width: 18px; height: 18px; }
.icon-btn .badge {
  position: absolute; top: -5px; right: -5px; min-width: 17px; height: 17px; padding: 0 4px;
  border-radius: 100px; background: var(--coral); color: #fff; font-size: 10px; font-weight: 700;
  display: grid; place-items: center; border: 2px solid var(--bg);
}
.avatar {
  display: flex; align-items: center; gap: 10px; padding: 5px 12px 5px 5px; background: var(--surface);
  border: 1px solid var(--line); border-radius: 100px; box-shadow: var(--sh-1); cursor: pointer;
}
.avatar .ph { width: 32px; height: 32px; border-radius: 50%; flex: none; background: linear-gradient(135deg, var(--brand-600), var(--brand)); color: #fff; display: grid; place-items: center; font-size: 12.5px; font-weight: 700; }
.avatar .who { line-height: 1.2; }
.avatar .who b { font-size: 13px; font-weight: 600; display: block; }
.avatar .who span { font-size: 11px; color: var(--ink-3); }
.avatar .chev { color: var(--ink-4); }

/* ============================ TABS ============================ */
.tabbar {
  display: flex; align-items: stretch; background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 5px; box-shadow: var(--sh-1); gap: 3px; margin-bottom: 32px;
}
.tab {
  flex: 1; display: flex; flex-direction: column; gap: 3px; padding: 11px 16px 10px;
  border-radius: var(--r-sm); cursor: pointer; position: relative; transition: background .14s; min-width: 0;
}
.tab:hover:not(.active) { background: var(--surface-2); }
.tab .t-top { display: flex; align-items: center; gap: 8px; }
.tab .t-code { font-size: 10px; font-weight: 700; letter-spacing: .04em; color: var(--ink-4); }
.tab .t-name { font-size: 13px; font-weight: 600; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -.01em; }
.tab .t-stat { width: 7px; height: 7px; border-radius: 50%; flex: none; margin-left: auto; }
.stat-ok { background: var(--success); } .stat-warn { background: var(--amber); } .stat-crit { background: var(--coral); }
.tab.active { background: var(--brand); box-shadow: var(--sh-2); }
.tab.active .t-name { color: #fff; }
.tab.active .t-code { color: rgba(255,255,255,.55); }

/* ============================ STAGE / transitions ============================ */
#stage { transition: opacity .28s ease, transform .28s ease; }
#stage.swap { opacity: 0; transform: translateY(8px); }

/* ============================ KPI GRID ============================ */
.kpi-grid { display: grid; gap: 22px; margin-bottom: 40px; }
.card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--sh-2); }
.kpi { padding: 24px 24px 22px; display: flex; flex-direction: column; gap: 17px; position: relative; overflow: hidden; }
.kpi .k-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.kpi .k-label { font-size: 11.5px; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em; display: flex; align-items: center; gap: 9px; }
.kpi .k-ico { width: 28px; height: 28px; border-radius: 7px; display: grid; place-items: center; flex: none; }
.kpi .k-ico svg { width: 15px; height: 15px; }
.ico-brand{background:var(--brand-tint);color:var(--brand);} .ico-success{background:var(--success-tint);color:var(--success-d);}
.ico-amber{background:var(--amber-tint);color:var(--amber-d);} .ico-info{background:var(--info-tint);color:var(--info);}
.ico-coral{background:var(--coral-tint);color:var(--coral-d);}
.kpi .k-menu { color: var(--ink-4); cursor: pointer; line-height: 0; }
.kpi .k-val { font-size: 38px; font-weight: 800; letter-spacing: -.03em; line-height: .95; color: var(--ink); display: flex; align-items: baseline; gap: 7px; }
.kpi .k-val .pre { font-size: 20px; font-weight: 700; color: var(--ink-2); letter-spacing: -.01em; }
.kpi .k-val .unit { font-size: 13px; font-weight: 500; color: var(--ink-3); letter-spacing: 0; }
.kpi .k-foot { display: flex; align-items: center; gap: 11px; }
.delta { display: inline-flex; align-items: center; gap: 3px; white-space: nowrap; font-size: 12px; font-weight: 700; line-height: 1; padding: 4px 9px; border-radius: 6px; letter-spacing: -.01em; }
.delta svg { width: 12px; height: 12px; flex: none; }
.delta.good { color: var(--success-d); background: var(--success-tint); }
.delta.bad  { color: var(--coral-d); background: var(--coral-tint); }
.delta.warn { color: var(--amber-d); background: var(--amber-tint); }
.delta.flat { color: var(--ink-3); background: var(--surface-3); }
.kpi .k-cmp { font-size: 12px; color: var(--ink-4); font-weight: 450; }
.kpi .spark { width: 100%; height: 40px; display: block; margin-top: 2px; }
.kpi .seg-bar { display: flex; gap: 4px; height: 8px; }
.kpi .seg-bar span { display: block; height: 100%; border-radius: 3px; }
.kpi .seg-legend { display: flex; flex-wrap: wrap; gap: 8px 16px; font-size: 11.5px; color: var(--ink-2); font-weight: 500; margin-top: 2px; }
.kpi .seg-legend i { width: 8px; height: 8px; border-radius: 3px; display: inline-block; margin-right: 6px; vertical-align: middle; }

/* ============================ SECTION LABELS ============================ */
.section-label { font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-3); margin: 0 4px 18px; display: flex; align-items: center; gap: 14px; }
.section-label .ln { flex: 1; height: 1px; background: var(--line); }
.section-label .n { color: var(--ink-4); font-weight: 700; }

/* ============================ ROW 2: CHARTS ============================ */
.row-2 { display: grid; grid-template-columns: 1fr 380px; gap: 22px; margin-bottom: 40px; }
.panel-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; padding: 24px 26px 18px; }
.panel-head .ph-title { font-size: 17px; font-weight: 700; letter-spacing: -.02em; }
.panel-head .ph-sub { font-size: 12.5px; color: var(--ink-3); margin-top: 4px; font-weight: 450; }
.seg-ctl { display: inline-flex; background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; padding: 3px; gap: 2px; flex: none; }
.seg-ctl button { border: 0; background: transparent; cursor: pointer; font-family: var(--font); font-size: 12px; font-weight: 600; color: var(--ink-3); padding: 6px 13px; border-radius: 6px; transition: all .14s; }
.seg-ctl button.on { background: var(--surface); color: var(--brand); box-shadow: var(--sh-1); }

.legend { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; padding: 0 26px 10px; }
.legend .lg { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--ink-2); cursor: pointer; font-weight: 500; }
.legend .lg .sw { width: 13px; height: 13px; border-radius: 4px; }
.legend .lg .ln { width: 18px; height: 0; border-top: 2.5px solid; border-radius: 2px; }
.legend .lg.mute { opacity: .4; }

.chart-body { padding: 12px 24px 12px; position: relative; }
#prodChart { width: 100%; height: 330px; display: block; }

.chart-foot { display: flex; align-items: center; gap: 0; padding: 18px 26px 26px; }
.chart-foot .stat-chip { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.chart-foot .stat-chip b { font-size: 19px; font-weight: 700; letter-spacing: -.02em; }
.chart-foot .stat-chip span { font-size: 11px; color: var(--ink-3); font-weight: 450; }
.vdiv { width: 1px; align-self: stretch; background: var(--line); margin: 0 22px; }

.side-panel { display: flex; flex-direction: column; }
.donut-wrap { padding: 24px 26px 16px; display: flex; align-items: center; gap: 22px; }
.donut-wrap > svg { width: 128px; height: 128px; flex: none; }
.donut-side .ds-lbl { font-size: 12px; color: var(--ink-3); margin-bottom: 5px; font-weight: 450; }
.donut-side .ds-val { font-size: 19px; font-weight: 700; color: var(--ink); letter-spacing: -.02em; }
.comp-list { padding: 10px 26px 24px; display: flex; flex-direction: column; }
.comp-row { display: grid; grid-template-columns: 11px 1fr auto auto; align-items: center; gap: 12px; padding: 12px 0; border-top: 1px solid var(--line-2); font-size: 13px; }
.comp-row:first-child { border-top: 0; }
.comp-row .dotc { width: 10px; height: 10px; border-radius: 3px; }
.comp-row .nm { color: var(--ink-2); font-weight: 500; }
.comp-row .vv { font-weight: 600; font-size: 13px; }
.comp-row .pp { font-size: 11.5px; color: var(--ink-4); width: 40px; text-align: right; font-weight: 600; }

/* ============================ ROW 3: GANTT ============================ */
.gantt { overflow: hidden; }
.gantt-toolbar { display: flex; align-items: center; gap: 9px; }
.chip { display: inline-flex; align-items: center; gap: 7px; font-size: 11.5px; font-weight: 600; color: var(--ink-2); padding: 6px 11px; border-radius: 7px; border: 1px solid var(--line); background: var(--surface); }
.chip svg { width: 14px; height: 14px; color: var(--ink-3); }
.chip .ct { width: 8px; height: 8px; border-radius: 3px; }

.gantt-grid { --label-w: 268px; position: relative; }
.gantt-time-head { display: grid; grid-template-columns: var(--label-w) 1fr; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); background: var(--surface-2); }
.gth-corner { padding: 12px 26px; font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-3); border-right: 1px solid var(--line); display: flex; align-items: center; gap: 9px; }
.gth-months { display: grid; grid-template-columns: repeat(4,1fr); }
.gth-month { padding: 9px 0 8px 16px; font-size: 12px; font-weight: 600; color: var(--ink-2); border-right: 1px solid var(--line-2); }
.gth-month:last-child { border-right: 0; }
.gth-month span { font-size: 10px; color: var(--ink-4); display: block; font-weight: 500; margin-top: 1px; }

.gantt-rows { position: relative; }
.gantt-grid-lines { position: absolute; top: 0; bottom: 0; left: var(--label-w); right: 0; display: grid; pointer-events: none; z-index: 0; }
.gantt-grid-lines i { border-right: 1px solid var(--line-2); }
.gtl-today { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--brand); z-index: 3; }
.gtl-today::before { content: "HOJE"; position: absolute; top: -1px; left: 50%; transform: translate(-50%,-100%); font-size: 8.5px; font-weight: 700; letter-spacing: .06em; color: #fff; background: var(--brand); padding: 2px 6px; border-radius: 4px; white-space: nowrap; }

.grow { display: grid; grid-template-columns: var(--label-w) 1fr; border-top: 1px solid var(--line-2); position: relative; z-index: 1; }
.grow:hover { background: var(--brand-tint-2); }
.glabel { padding: 0 26px; border-right: 1px solid var(--line); display: flex; align-items: center; gap: 12px; min-height: 56px; }
.glabel .gl-ico { width: 30px; height: 30px; border-radius: 7px; display: grid; place-items: center; flex: none; }
.glabel .gl-ico svg { width: 15px; height: 15px; }
.glabel .gl-txt b { font-size: 13px; font-weight: 600; display: block; line-height: 1.25; letter-spacing: -.01em; }
.glabel .gl-txt span { font-size: 11px; color: var(--ink-4); font-weight: 450; }
.glabel .gl-own { margin-left: auto; width: 24px; height: 24px; border-radius: 50%; background: var(--surface-3); color: var(--ink-2); display: grid; place-items: center; font-size: 9.5px; font-weight: 700; flex: none; }
.gtrack { position: relative; min-height: 56px; }
.gbar { position: absolute; top: 50%; transform: translateY(-50%); height: 20px; border-radius: 6px; display: flex; overflow: hidden; box-shadow: var(--sh-1); cursor: pointer; transition: filter .14s, box-shadow .14s; }
.gbar:hover { filter: brightness(1.05); box-shadow: var(--sh-2); }
.gseg { height: 100%; }
.gseg-done { background: var(--success); }
.gseg-prog { background: repeating-linear-gradient(135deg, var(--brand-600), var(--brand-600) 6px, var(--brand-700) 6px, var(--brand-700) 12px); }
.gseg-warn { background: var(--amber); }
.gseg-late { background: repeating-linear-gradient(135deg, var(--coral), var(--coral) 6px, var(--coral-d) 6px, var(--coral-d) 12px); }
.gseg-plan { background: var(--surface-3); border: 1px dashed var(--line-strong); }
.gpct { position: absolute; right: 0; top: 50%; transform: translate(calc(100% + 9px),-50%); font-size: 11px; font-weight: 600; color: var(--ink-3); white-space: nowrap; }
.gpct.bad { color: var(--coral-d); }
.gbar.plan-bar { box-shadow: none; }
.gmile { position: absolute; top: 50%; width: 14px; height: 14px; transform: translate(-50%,-50%) rotate(45deg); border-radius: 3px; background: var(--brand); box-shadow: var(--sh-1); z-index: 2; }

/* tooltip */
.tip { position: absolute; z-index: 20; pointer-events: none; background: var(--ink); color: #fff; border-radius: var(--r); padding: 12px 14px; box-shadow: var(--sh-pop); min-width: 172px; font-size: 12px; opacity: 0; transform: translateY(4px); transition: opacity .12s, transform .12s; }
.tip.show { opacity: 1; transform: translateY(0); }
.tip .tt-h { font-weight: 700; font-size: 13px; margin-bottom: 9px; display: flex; align-items: center; gap: 8px; }
.tip .tt-r { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin: 5px 0; }
.tip .tt-r .l { color: rgba(255,255,255,.62); display: flex; align-items: center; gap: 7px; font-size: 11.5px; font-weight: 450; }
.tip .tt-r .v { font-weight: 600; }
.tip .tt-r .sw { width: 10px; height: 10px; border-radius: 3px; }
.tip::after { content: ""; position: absolute; bottom: -5px; left: 26px; width: 10px; height: 10px; background: var(--ink); transform: rotate(45deg); }

.foot-note { margin-top: 28px; display: flex; align-items: center; justify-content: space-between; font-size: 11.5px; color: var(--ink-4); font-weight: 450; }
.foot-note .fn-r { display: flex; gap: 22px; }

/* ============================================================
   V3 — per-gerência Level-2 visualization types
   ============================================================ */
.l2-svg { width: 100%; display: block; }
.l2-svg.tall { height: 330px; }

/* ---- info chip in panel head ---- */
.head-chip { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; color: var(--ink-2); padding: 7px 12px; border-radius: 8px; background: var(--surface-2); border: 1px solid var(--line); flex: none; }
.head-chip b { color: var(--brand); }

/* ---- RISK MATRIX (Manutenção) ---- */
.mx { padding: 18px 26px 22px; }
.mx-plot { display: grid; grid-template-columns: 26px 1fr; gap: 12px; align-items: stretch; }
.mx-ylabel { writing-mode: vertical-rl; transform: rotate(180deg); text-align: center; font-size: 10.5px; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: .08em; }
.mx-grid { display: grid; grid-template-columns: 70px repeat(3, 1fr); gap: 9px; }
.mx-rl { display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 12px; font-weight: 600; color: var(--ink-2); }
.mx-cell { min-height: 76px; border-radius: 9px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: 1px solid transparent; transition: transform .12s; cursor: default; position: relative; }
.mx-cell:hover { transform: translateY(-2px); }
.mx-cell b { font-size: 28px; font-weight: 800; letter-spacing: -.03em; line-height: 1; }
.mx-cell span { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; opacity: .8; }
.mx-corner { }
.mx-cl { font-size: 12px; font-weight: 600; color: var(--ink-2); text-align: center; padding-top: 2px; }
.mx-xlabel { text-align: center; font-size: 10.5px; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: .08em; padding-top: 12px; grid-column: 2 / -1; }
.mx-z-low  { background: var(--success-tint); color: var(--success-d); border-color: rgba(16,185,129,.20); }
.mx-z-mid  { background: var(--amber-tint);   color: var(--amber-d);   border-color: rgba(245,158,11,.22); }
.mx-z-high { background: var(--coral-tint);   color: var(--coral-d);   border-color: rgba(239,68,68,.22); }
.mx-scale { display: flex; gap: 16px; padding: 16px 0 0 38px; }
.mx-scale span { display: inline-flex; align-items: center; gap: 7px; font-size: 11.5px; color: var(--ink-2); font-weight: 500; }
.mx-scale i { width: 11px; height: 11px; border-radius: 3px; }

/* ---- BAD ACTORS TABLE (Manutenção side) ---- */
.bt { padding: 6px 0 16px; }
.bt-row { padding: 14px 26px; border-top: 1px solid var(--line-2); }
.bt-row:first-of-type { border-top: 0; }
.bt-top { display: flex; align-items: center; gap: 13px; }

.bt-nm { flex: 1; min-width: 0; }
.bt-nm b { font-size: 13.5px; font-weight: 600; display: block; letter-spacing: -.01em; }
.bt-nm span { font-size: 11px; color: var(--ink-4); }
.bt-val { text-align: right; flex: none; }
.bt-val b { font-size: 14.5px; font-weight: 700; letter-spacing: -.02em; }
.bt-val span { font-size: 10.5px; color: var(--ink-4); display: block; margin-top: 1px; }
.bt-bar { margin-top: 9px; height: 5px; border-radius: 3px; background: var(--surface-3); overflow: hidden; }
.bt-bar i { display: block; height: 100%; border-radius: 3px; }

/* ---- GROUPED BARS (Logística side) ---- */
.gb-note { padding: 4px 26px 22px; font-size: 12px; color: var(--ink-3); display: flex; align-items: center; gap: 8px; }
.gb-note .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); }

/* ---- RADAR (side) ---- */
.radar-note { padding: 4px 26px 22px; font-size: 12px; color: var(--ink-3); display: flex; align-items: center; gap: 8px; }
.radar-note .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); }

body { overflow-x: auto; }

<script>
/* ============================================================

(function () {
  "use strict";
  const SVGNS = "http://www.w3.org/2000/svg";
  const el = (n, a) => { const e = document.createElementNS(SVGNS, n); for (const k in (a||{})) e.setAttribute(k, a[k]); return e; };
  const C = (v) => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  const MESES = window.MESES;
  const GRAD = { brandGrad: ["--brand-600","--brand"], amberGrad: ["--amber","--amber-d"] };
  const baseColor = (k) => k === "brandGrad" ? C("--brand") : k === "amberGrad" ? C("--amber-d") : C("--"+k);
  function gradId(svg, key) {
    const id = "g_"+Math.random().toString(36).slice(2,7), [a,b] = GRAD[key];
    const lg = el("linearGradient",{id,x1:0,y1:0,x2:0,y2:1});
    lg.appendChild(el("stop",{offset:0,"stop-color":C(a)})); lg.appendChild(el("stop",{offset:1,"stop-color":C(b)}));
    const defs=el("defs"); defs.appendChild(lg); svg.appendChild(defs); return `url(#${id})`;
  }
  const fmt = (n) => (typeof n === "number" && n % 1 !== 0) ? n.toFixed(1) : n;

  /* ---- icons ---- */
  const ICON = {
    drop:'<path d="M12 2 5 9c-2 2-2 6 0 8a5 5 0 0 0 7 1 5 5 0 0 0 7-1c2-2 2-6 0-8z"/>',
    bars:'<path d="M12 20V10M18 20V4M6 20v-4"/>',
    fuel:'<path d="M3 22V4a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v18M3 11h10M13 9h3a2 2 0 0 1 2 2v6a2 2 0 0 0 4 0V9.5L18 5"/>',
    truck:'<path d="M10 17h4V5H2v12h3"/><path d="M20 17h2v-3.3a1 1 0 0 0-.3-.7l-2.5-2.5a1 1 0 0 0-.7-.3H14v7h2"/><circle cx="7.5" cy="17.5" r="1.6"/><circle cx="17.5" cy="17.5" r="1.6"/>',
    alert:'<path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/>',
    refine:'<path d="M2 20h20M4 20V8l5-3v15M14 20V4l6 4v12M9 11h0M9 15h0M17 11h0M17 15h0"/>',
    flow:'<path d="M3 12h4l3-9 4 18 3-9h4"/>',
    wrench:'<path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18l3 3 6.3-6.3a4 4 0 0 0 5.4-5.4l-2.6 2.6-2-2z"/>',
    tank:'<path d="M3 21V7l9-4 9 4v14M3 21h18M9 21v-6h6v6M7 11h.01M12 11h.01M17 11h.01"/>',
    factory:'<path d="M2 20h20M4 20V9l5 3V9l5 3V6l5 3v11M8 16h0M14 16h0"/>',
    clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
    route:'<circle cx="6" cy="19" r="2.4"/><circle cx="18" cy="5" r="2.4"/><path d="M8.4 19H14a4 4 0 0 0 0-8H10a4 4 0 0 1 0-8h5.6"/>',
    check:'<path d="M20 6 9 17l-5-5"/>',
    stack:'<path d="M12 2 2 7l10 5 10-5z"/><path d="M2 12l10 5 10-5M2 17l10 5 10-5"/>',
  };
  const svgIco = (k) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICON[k]||""}</svg>`;
  const kebab = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="19" cy="12" r="1.7"/></svg>';
  const arrU = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>';
  const arrD = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';

  /* ---- sparkline ---- */
  function spark(svg, data, colorKey) {
    const stroke = baseColor(colorKey), w = svg.clientWidth || 200, h = svg.clientHeight || 40, pad = 3;
    const min = Math.min(...data), max = Math.max(...data), rng = (max-min)||1;
    const x = i => pad + (i/(data.length-1))*(w-pad*2), y = v => h-pad-((v-min)/rng)*(h-pad*2-2);
    svg.setAttribute("viewBox",`0 0 ${w} ${h}`); svg.innerHTML="";
    const id="sp"+Math.random().toString(36).slice(2,7);
    const grad=el("linearGradient",{id,x1:0,y1:0,x2:0,y2:1});
    grad.appendChild(el("stop",{offset:0,"stop-color":stroke,"stop-opacity":.18})); grad.appendChild(el("stop",{offset:1,"stop-color":stroke,"stop-opacity":0}));
    const defs=el("defs"); defs.appendChild(grad); svg.appendChild(defs);
    const area=`M${x(0).toFixed(1)} ${h-pad} `+data.map((v,i)=>`L${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(" ")+` L${x(data.length-1).toFixed(1)} ${h-pad} Z`;
    let d=""; data.forEach((v,i)=> d+=(i?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)+" ");
    svg.appendChild(el("path",{d:area,fill:`url(#${id})`}));
    svg.appendChild(el("path",{d:d.trim(),fill:"none",stroke,"stroke-width":1.9,"stroke-linejoin":"round","stroke-linecap":"round"}));
    const li=data.length-1;
    svg.appendChild(el("circle",{cx:x(li),cy:y(data[li]),r:2.7,fill:stroke}));
    svg.appendChild(el("circle",{cx:x(li),cy:y(data[li]),r:5,fill:stroke,"fill-opacity":.16}));
  }

  /* ---- LEVEL 1 · KPIs ---- */
  function renderKpis(kpis) {
    const grid = document.getElementById("kpiGrid");
    grid.style.gridTemplateColumns = `repeat(${kpis.length}, 1fr)`;
    grid.innerHTML = kpis.map(k => {
      let body;
      if (k.variant === "spark") {
        body = `<div class="k-foot"><span class="delta ${k.delta.tone}">${k.delta.dir==="up"?arrU:arrD}${k.delta.val}</span><span class="k-cmp">${k.cmp}</span></div>
                <svg class="spark" data-spark="${k.spark.join(",")}" data-color="${k.color}"></svg>`;
      } else {
        const bars = k.seg.map(s=>`<span style="flex:${s.flex};background:var(--${s.color})"></span>`).join("");
        const leg = k.seg.map(s=>`<span><i style="background:var(--${s.color})"></i>${s.label}</span>`).join("");
        body = `<div class="seg-bar">${bars}</div><div class="seg-legend">${leg}</div>`;
      }
      const pre = k.pre ? `<span class="pre">${k.pre}</span>` : "";
      return `<article class="card kpi">
        <div class="k-head"><span class="k-label"><span class="k-ico ico-${k.tone}">${svgIco(k.ico)}</span>${k.label}</span><span class="k-menu">${kebab}</span></div>
        <div class="k-val num">${pre}${k.value}<span class="unit">${k.unit}</span></div>${body}</article>`;
    }).join("");
    grid.querySelectorAll("[data-spark]").forEach(s => spark(s, s.getAttribute("data-spark").split(",").map(Number), s.getAttribute("data-color")));
  }

  /* ---- shared bits ---- */
  function panelHead(title, sub, right) {
    return `<div class="panel-head"><div><div class="ph-title">${title}</div><div class="ph-sub">${sub}</div></div>${right||""}</div>`;
  }
  const segCtl = (a,b,c,on) => `<div class="seg-ctl"><button${on===0?' class="on"':''}>${a}</button><button${on===1?' class="on"':''}>${b}</button><button${on===2?' class="on"':''}>${c}</button></div>`;
  const headChip = (html) => `<div class="head-chip">${html}</div>`;
  function wireSeg(scope) {
    scope.querySelectorAll(".seg-ctl button").forEach(b => b.addEventListener("click", () => {
      b.parentElement.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
    }));
  }
  function buildFoot(id, foot) {
    document.getElementById(id).innerHTML = foot.map((f,i) =>
      (i?'<div class="vdiv"></div>':"") + `<div class="stat-chip"><b class="num" ${f.c?`style="color:var(--${f.c})"`:""}>${f.b}</b><span>${f.s}</span></div>`).join("");
  }

  /* ============================================================
     MAIN · type: COMBO  (bars + ghost + lines)
     ============================================================ */
  let COMBO = null, HOVER = false;
  function mainCombo(card, d) {
    const cfg = d.chart;
    card.innerHTML = panelHead(cfg.title, cfg.sub, segCtl("Diário","Semanal","Mensal",2)) +
      `<div class="legend" id="l2legend"></div>
       <div class="chart-body"><svg id="l2svg" class="l2-svg tall"></svg><div class="tip" id="l2tip"></div></div>
       <div class="chart-foot" id="l2foot"></div>`;
    // legend
    const items = [];
    cfg.bars.forEach(b => items.push(`<span class="lg"><span class="sw" style="background:${GRAD[b.color]?`linear-gradient(180deg,${C(GRAD[b.color][0])},${C(GRAD[b.color][1])})`:baseColor(b.color)}"></span>${b.label}</span>`));
    if (cfg.ghost) items.push(`<span class="lg"><span class="ln" style="border-color:${baseColor(cfg.ghost.color)};${cfg.ghost.dashed?"border-top-style:dashed":""}"></span>${cfg.ghost.label}</span>`);
    cfg.lines.forEach(ln => items.push(`<span class="lg"><span class="ln" style="border-color:${baseColor(ln.color)};${ln.dashed?"border-top-style:dashed":""}"></span>${ln.label}</span>`));
    document.getElementById("l2legend").innerHTML = items.join("");
    document.querySelectorAll("#l2legend .lg").forEach(l => l.addEventListener("click",()=>l.classList.toggle("mute")));
    comboRender(cfg, null, false);
    buildFoot("l2foot", cfg.foot);
    wireSeg(card);
  }
  function comboRender(cfg, idx, hover) {
    COMBO = cfg; HOVER = !!hover;
    const svg = document.getElementById("l2svg"); if (!svg) return;
    const i0 = idx == null ? cfg.hilite : idx;
    const w = svg.clientWidth || 900, h = 330;
    svg.setAttribute("viewBox",`0 0 ${w} ${h}`); svg.innerHTML="";
    const mL=50, mR=cfg.right?54:24, mT=18, mB=32, plotW=w-mL-mR, plotH=h-mT-mB;
    const L=cfg.left, R=cfg.right;
    const yL=v=>mT+plotH-(v-L.min)/(L.max-L.min)*plotH, yR=v=>mT+plotH-(v-R.min)/(R.max-R.min)*plotH;
    const sX=i=>mL+(i+.5)/MESES.length*plotW;
    const line2=C("--line-2"), line=C("--line"), ink3=C("--ink-3"), ink4=C("--ink-4");
    for (let v=L.min; v<=L.max; v+=L.step) { const yy=yL(v);
      svg.appendChild(el("line",{x1:mL,y1:yy,x2:w-mR,y2:yy,stroke:v===L.min?line:line2,"stroke-width":1}));
      const t=el("text",{x:mL-10,y:yy+4,"text-anchor":"end",fill:ink4,"font-size":11,"font-family":"var(--font)"}); t.textContent=v>=1000?(v/1000)+"k":v; svg.appendChild(t); }
    if (R) { const rc=baseColor(R.color); for (let v=R.min; v<=R.max; v+=R.step){ const t=el("text",{x:w-mR+10,y:yR(v)+4,"text-anchor":"start",fill:rc,"font-size":11,"font-family":"var(--font)","fill-opacity":.85}); t.textContent=v+R.suffix; svg.appendChild(t);} }
    const nBars=cfg.bars.length, slotW=plotW/MESES.length;
    if (cfg.ghost && nBars===1) { const gw=Math.min(26,slotW*.5); MESES.forEach((m,i)=>{ const gy=yL(cfg.ghost.data[i]); svg.appendChild(el("rect",{x:sX(i)-gw/2,y:gy,width:gw,height:mT+plotH-gy,rx:4,fill:line2})); }); }
    cfg.bars.forEach((b,bi)=>{ const grouped=nBars>1, bw=grouped?Math.min(13,slotW*.28):Math.min(22,slotW*.42), gap=3, groupW=grouped?bw*nBars+gap*(nBars-1):bw;
      const fill=GRAD[b.color]?gradId(svg,b.color):baseColor(b.color);
      MESES.forEach((m,i)=>{ const cx=sX(i), x=grouped?cx-groupW/2+bi*(bw+gap):cx-bw/2, by=yL(b.data[i]), dim=(HOVER&&i!==i0)?.42:1;
        svg.appendChild(el("rect",{x,y:by,width:bw,height:mT+plotH-by,rx:3,fill,opacity:dim})); }); });
    MESES.forEach((m,i)=>{ const t=el("text",{x:sX(i),y:h-12,"text-anchor":"middle",fill:i===i0?C("--brand"):ink3,"font-size":11.5,"font-weight":i===i0?700:500,"font-family":"var(--font)"}); t.textContent=m; svg.appendChild(t); });
    if (cfg.ghost) { const gc=baseColor(cfg.ghost.color); let gd=""; cfg.ghost.data.forEach((v,i)=> gd+=(i?"L":"M")+sX(i).toFixed(1)+" "+yL(v).toFixed(1)+" ");
      svg.appendChild(el("path",{d:gd.trim(),fill:"none",stroke:gc,"stroke-width":2,"stroke-dasharray":cfg.ghost.dashed?"5 4":"0","stroke-linecap":"round"}));
      cfg.ghost.data.forEach((v,i)=> svg.appendChild(el("circle",{cx:sX(i),cy:yL(v),r:2.4,fill:"#fff",stroke:gc,"stroke-width":1.5}))); }
    cfg.lines.forEach(ln=>{ const c=baseColor(ln.color), yf=ln.axis==="right"?yR:yL; let d=""; ln.data.forEach((v,i)=> d+=(i?"L":"M")+sX(i).toFixed(1)+" "+yf(v).toFixed(1)+" ");
      svg.appendChild(el("path",{d:d.trim(),fill:"none",stroke:c,"stroke-width":2.4,"stroke-dasharray":ln.dashed?"5 4":"0","stroke-linejoin":"round","stroke-linecap":"round"}));
      ln.data.forEach((v,i)=> svg.appendChild(el("circle",{cx:sX(i),cy:yf(v),r:3,fill:"#fff",stroke:c,"stroke-width":2}))); });
    const gx=sX(i0); svg.appendChild(el("line",{x1:gx,y1:mT,x2:gx,y2:mT+plotH,stroke:C("--brand"),"stroke-width":1,"stroke-dasharray":"3 3","stroke-opacity":.38}));
    MESES.forEach((m,i)=>{ const r=el("rect",{x:mL+i/MESES.length*plotW,y:mT,width:plotW/MESES.length,height:plotH,fill:"transparent",style:"cursor:pointer"});
      r.addEventListener("mouseenter",()=>{ comboRender(cfg,i,true); comboTip(cfg,i); }); svg.appendChild(r); });
    svg.addEventListener("mouseleave",()=>{ comboRender(cfg,null,false); comboTip(cfg,cfg.hilite); },{once:true});
    comboTip(cfg,i0);
  }
  function comboTip(cfg,i) {
    const tip=document.getElementById("l2tip"), svg=document.getElementById("l2svg"); if(!tip||!svg) return;
    const w=svg.clientWidth||900, mL=50, mR=cfg.right?54:24, plotW=w-mL-mR, sx=mL+(i+.5)/MESES.length*plotW;
    const rows=[]; cfg.bars.forEach(b=>rows.push({c:baseColor(b.color),l:b.label,v:fmt(b.data[i])+" "+b.unit}));
    if (cfg.ghost) rows.push({c:baseColor(cfg.ghost.color),l:cfg.ghost.label,v:fmt(cfg.ghost.data[i])+" "+cfg.ghost.unit});
    cfg.lines.forEach(ln=>rows.push({c:baseColor(ln.color),l:ln.label,v:fmt(ln.data[i])+(ln.unit==="%"?"%":" "+ln.unit)}));
    tip.innerHTML=`<div class="tt-h"><span class="sw" style="background:${baseColor(cfg.bars[0].color)}"></span>${MESES[i]} / 2026</div>`+
      rows.map(r=>`<div class="tt-r"><span class="l"><span class="sw" style="background:${r.c}"></span>${r.l}</span><span class="v num">${r.v}</span></div>`).join("");
    const rect=svg.getBoundingClientRect(), scale=rect.width/w, tx=sx*scale;
    tip.classList.add("show"); tip.style.left=Math.min(Math.max(tx-86,6),rect.width-194)+"px"; tip.style.top="6px";
  }

  /* ============================================================
     MAIN · type: AREA  (24h stacked area)
     ============================================================ */
  function mainArea(card, d) {
    const cfg = d.main;
    card.innerHTML = panelHead(cfg.title, cfg.sub, segCtl("Hoje","Semana","Mês",0)) +
      `<div class="legend" id="l2legend">${cfg.series.map(s=>`<span class="lg"><span class="sw" style="background:${baseColor(s.color)}"></span>${s.label}</span>`).join("")}</div>
       <div class="chart-body"><svg id="l2svg" class="l2-svg tall"></svg></div>
       <div class="chart-foot" id="l2foot"></div>`;
    areaRender(cfg);
    buildFoot("l2foot", cfg.foot);
    wireSeg(card);
    window.addEventListener("resize", () => { if (document.getElementById("l2svg")) areaRender(cfg); }, { once:true });
  }
  function areaRender(cfg) {
    const svg=document.getElementById("l2svg"); if(!svg) return;
    const n=cfg.series[0].data.length, w=svg.clientWidth||900, h=330;
    svg.setAttribute("viewBox",`0 0 ${w} ${h}`); svg.innerHTML="";
    const mL=46,mR=20,mT=18,mB=30,plotW=w-mL-mR,plotH=h-mT-mB,L=cfg.left;
    const yL=v=>mT+plotH-(v-L.min)/(L.max-L.min)*plotH, X=i=>mL+i/(n-1)*plotW;
    const line=C("--line"),line2=C("--line-2"),ink4=C("--ink-4");
    for (let v=L.min; v<=L.max; v+=L.step){ const yy=yL(v); svg.appendChild(el("line",{x1:mL,y1:yy,x2:w-mR,y2:yy,stroke:v===L.min?line:line2,"stroke-width":1}));
      const t=el("text",{x:mL-9,y:yy+4,"text-anchor":"end",fill:ink4,"font-size":11,"font-family":"var(--font)"}); t.textContent=v+(L.suffix||""); svg.appendChild(t); }
    // stacked cumulative
    const cum = new Array(n).fill(L.min);
    cfg.series.forEach((s,si) => {
      const col=baseColor(s.color);
      const top = s.data.map((v,i)=> cum[i]+v), bot = cum.slice();
      let path = `M${X(0).toFixed(1)} ${yL(top[0]).toFixed(1)} ` + top.map((v,i)=>`L${X(i).toFixed(1)} ${yL(v).toFixed(1)}`).join(" ") +
                 " " + bot.map((v,i)=>`L${X(n-1-i).toFixed(1)} ${yL(bot[n-1-i]).toFixed(1)}`).join(" ") + " Z";
      const id="ar"+si, grad=el("linearGradient",{id,x1:0,y1:0,x2:0,y2:1});
      grad.appendChild(el("stop",{offset:0,"stop-color":col,"stop-opacity":.42})); grad.appendChild(el("stop",{offset:1,"stop-color":col,"stop-opacity":.12}));
      const defs=el("defs"); defs.appendChild(grad); svg.appendChild(defs);
      svg.appendChild(el("path",{d:path,fill:`url(#${id})`}));
      let ld=""; top.forEach((v,i)=> ld+=(i?"L":"M")+X(i).toFixed(1)+" "+yL(v).toFixed(1)+" ");
      svg.appendChild(el("path",{d:ld.trim(),fill:"none",stroke:col,"stroke-width":2.4,"stroke-linejoin":"round","stroke-linecap":"round"}));
      for (let i=0;i<n;i++) cum[i]=top[i];
    });
    // x labels (cfg.xcats spread over n points)
    const step=(n-1)/(cfg.xcats.length-1);
    cfg.xcats.forEach((c,k)=>{ const i=Math.round(k*step); const t=el("text",{x:X(i),y:h-10,"text-anchor":"middle",fill:C("--ink-3"),"font-size":11,"font-family":"var(--font)"}); t.textContent=c; svg.appendChild(t); });
  }

  /* ============================================================
     MAIN · type: MATRIX  (3x3 risk matrix)
     ============================================================ */
  function mainMatrix(card, d) {
    const cfg = d.main;
    const zone = (r,c) => { const s=(2-r)+c; return s<=1?"low":s===2?"mid":s===3&&c<2?"mid":"high"; };
    let grid = "";
    cfg.cells.forEach((row,r) => {
      grid += `<div class="mx-rl">${cfg.ycats[r]}</div>`;
      row.forEach((v,c) => { grid += `<div class="mx-cell mx-z-${zone(r,c)}"><b class="num">${v}</b><span>O.S.</span></div>`; });
    });
    grid += `<div class="mx-corner"></div>` + cfg.xcats.map(x=>`<div class="mx-cl">${x}</div>`).join("");
    grid += `<div class="mx-xlabel">${cfg.xlabel} →</div>`;
    card.innerHTML = panelHead(cfg.title, cfg.sub, headChip(`<span style="width:7px;height:7px;border-radius:50%;background:var(--coral);display:inline-block"></span>12 em zona crítica`)) +
      `<div class="mx">
         <div class="mx-plot">
           <div class="mx-ylabel">${cfg.ylabel} ↑</div>
           <div class="mx-grid">${grid}</div>
         </div>
         <div class="mx-scale">
           <span><i style="background:var(--success)"></i>Controlado</span>
           <span><i style="background:var(--amber)"></i>Atenção</span>
           <span><i style="background:var(--coral)"></i>Crítico — ação imediata</span>
         </div>
       </div>
       <div class="chart-foot" id="l2foot" style="border-top:1px solid var(--line-2)"></div>`;
    buildFoot("l2foot", cfg.foot);
  }

  /* ============================================================
     MAIN · type: SANKEY  (balance)
     ============================================================ */
  function mainSankey(card, d) {
    const cfg = d.main;
    card.innerHTML = panelHead(cfg.title, cfg.sub, headChip(`Entrada <b>${cfg.source.value}</b>`)) +
      `<div class="chart-body"><svg id="l2svg" class="l2-svg tall"></svg></div>
       <div class="chart-foot" id="l2foot"></div>`;
    sankeyRender(cfg);
    buildFoot("l2foot", cfg.foot);
    window.addEventListener("resize", () => { if (document.getElementById("l2svg")) sankeyRender(cfg); }, { once:true });
  }
  function sankeyRender(cfg) {
    const svg=document.getElementById("l2svg"); if(!svg) return;
    const w=svg.clientWidth||900, h=330; svg.setAttribute("viewBox",`0 0 ${w} ${h}`); svg.innerHTML="";
    const mT=26, mB=14, plotH=h-mT-mB, srcX=14, nodeW=20, srcRight=srcX+nodeW;
    const labelW=190, destX=w-labelW-nodeW, n=cfg.flows.length, gap=12, availH=plotH-gap*(n-1);
    // source node
    svg.appendChild(el("rect",{x:srcX,y:mT,width:nodeW,height:plotH,rx:4,fill:C("--brand")}));
    const sl=el("text",{x:srcX,y:mT-10,fill:C("--ink"),"font-size":12,"font-weight":700,"font-family":"var(--font)"}); sl.textContent=cfg.source.label.toUpperCase(); svg.appendChild(sl);
    let sy=mT, dy=mT, midx=(srcRight+destX)/2;
    cfg.flows.forEach(f => {
      const sh=f.pct/100*plotH, dh=f.pct/100*availH, col=baseColor(f.color);
      const sy0=sy, sy1=sy+sh, dy0=dy, dy1=dy+dh;
      const band=`M${srcRight} ${sy0.toFixed(1)} C${midx} ${sy0.toFixed(1)} ${midx} ${dy0.toFixed(1)} ${destX} ${dy0.toFixed(1)} L${destX} ${dy1.toFixed(1)} C${midx} ${dy1.toFixed(1)} ${midx} ${sy1.toFixed(1)} ${srcRight} ${sy1.toFixed(1)} Z`;
      svg.appendChild(el("path",{d:band,fill:col,"fill-opacity":.42}));
      svg.appendChild(el("rect",{x:destX,y:dy0,width:nodeW,height:dh,rx:3,fill:col}));
      const mid=(dy0+dy1)/2;
      const nm=el("text",{x:destX+nodeW+12,y:mid-2,fill:C("--ink"),"font-size":12.5,"font-weight":600,"font-family":"var(--font)"}); nm.textContent=f.label; svg.appendChild(nm);
      const vv=el("text",{x:destX+nodeW+12,y:mid+14,fill:C("--ink-3"),"font-size":11,"font-family":"var(--font)"}); vv.textContent=`${f.pct}% · ${f.val} un./d`; svg.appendChild(vv);
      sy=sy1; dy=dy1+gap;
    });
  }

  /* ============================================================
     SIDE · type: DONUT
     ============================================================ */
  function sideDonut(card, d) {
    const dd = d.donut;
    card.innerHTML = panelHead(dd.title, dd.sub) +
      `<div class="donut-wrap"><svg id="l2donut"></svg>
         <div class="donut-side"><div class="ds-lbl">${dd.sideLbl}</div><div class="ds-val num">${dd.sideVal}</div>
         <span class="delta ${dd.delta.tone}" style="margin-top:9px">${dd.delta.dir==="up"?arrU:arrD}${dd.delta.val}</span></div>
       </div>
       <div class="comp-list">${dd.segs.map(s=>`<div class="comp-row"><span class="dotc" style="background:var(--${s.color})"></span><span class="nm">${s.nm}</span><span class="vv num">${s.vv}</span><span class="pp num">${s.pp}%</span></div>`).join("")}</div>`;
    const svg=document.getElementById("l2donut"), cx=64,cy=64,r=48,sw=18,circ=2*Math.PI*r;
    svg.setAttribute("viewBox","0 0 128 128"); svg.innerHTML="";
    svg.appendChild(el("circle",{cx,cy,r,fill:"none",stroke:C("--surface-3"),"stroke-width":sw}));
    let off=0; dd.segs.forEach(s=>{ const len=s.pp/100*circ; svg.appendChild(el("circle",{cx,cy,r,fill:"none",stroke:C("--"+s.color),"stroke-width":sw,"stroke-dasharray":`${len-2} ${circ-len+2}`,"stroke-dashoffset":-off,transform:`rotate(-90 ${cx} ${cy})`})); off+=len; });
    const t1=el("text",{x:cx,y:cy-1,"text-anchor":"middle",fill:C("--ink"),"font-size":23,"font-weight":800,"font-family":"var(--font)","letter-spacing":"-1"}); t1.textContent=dd.center; svg.appendChild(t1);
    const t2=el("text",{x:cx,y:cy+15,"text-anchor":"middle",fill:C("--ink-3"),"font-size":10,"font-family":"var(--font)"}); t2.textContent=dd.centerSub; svg.appendChild(t2);
  }

  /* ============================================================
     SIDE · type: TABLE  (bad actors)
     ============================================================ */
  function sideTable(card, d) {
    const s = d.side;
    card.innerHTML = panelHead(s.title, s.sub) +
      `<div class="bt">${s.rows.map((r,i)=>`
        <div class="bt-row">
          <div class="bt-top">
            <span class="bt-rank">${i+1}</span>
            <span class="bt-nm"><b>${r.nm}</b><span>${r.sub}</span></span>
            <span class="bt-val"><b class="num">${r.val}</b><span>${r.h}</span></span>
          </div>
          <div class="bt-bar"><i style="width:${r.bar}%;background:var(--${r.tone})"></i></div>
        </div>`).join("")}</div>`;
  }

  /* ============================================================
     SIDE · type: GROUPBARS  (terceirizado vs próprio)
     ============================================================ */
  function sideGroupbars(card, d) {
    const cfg = d.side;
    card.innerHTML = panelHead(cfg.title, cfg.sub) +
      `<div class="legend" style="padding:0 26px 8px">${cfg.series.map(s=>`<span class="lg"><span class="sw" style="background:${baseColor(s.color)}"></span>${s.label}</span>`).join("")}</div>
       <div class="chart-body" style="padding:6px 20px 4px"><svg id="l2gb" class="l2-svg" style="height:212px"></svg></div>
       <div class="gb-note"><span class="dot"></span>${cfg.note}</div>`;
    const svg=document.getElementById("l2gb"), w=svg.clientWidth||340, h=212;
    svg.setAttribute("viewBox",`0 0 ${w} ${h}`); svg.innerHTML="";
    const mL=36,mR=10,mT=12,mB=26,plotW=w-mL-mR,plotH=h-mT-mB,L=cfg.left;
    const yL=v=>mT+plotH-(v-L.min)/(L.max-L.min)*plotH, line=C("--line"),line2=C("--line-2"),ink4=C("--ink-4");
    for (let v=L.min; v<=L.max; v+=L.step){ const yy=yL(v); svg.appendChild(el("line",{x1:mL,y1:yy,x2:w-mR,y2:yy,stroke:v===L.min?line:line2,"stroke-width":1}));
      const t=el("text",{x:mL-8,y:yy+4,"text-anchor":"end",fill:ink4,"font-size":10,"font-family":"var(--font)"}); t.textContent=v; svg.appendChild(t); }
    const nc=cfg.cats.length, slot=plotW/nc, ns=cfg.series.length, bw=Math.min(16,slot*.26), gap=4, gw=bw*ns+gap*(ns-1);
    cfg.cats.forEach((cat,ci)=>{ const cx=mL+(ci+.5)*slot;
      cfg.series.forEach((s,si)=>{ const x=cx-gw/2+si*(bw+gap), by=yL(s.data[ci]); svg.appendChild(el("rect",{x,y:by,width:bw,height:mT+plotH-by,rx:3,fill:baseColor(s.color)})); });
      const t=el("text",{x:cx,y:h-9,"text-anchor":"middle",fill:C("--ink-3"),"font-size":10.5,"font-family":"var(--font)"}); t.textContent=cat; svg.appendChild(t); });
  }

  /* ============================================================
     SIDE · type: RADAR
     ============================================================ */
  function sideRadar(card, d) {
    const cfg = d.side;
    card.innerHTML = panelHead(cfg.title, cfg.sub) +
      `<div class="chart-body" style="padding:6px 14px 0"><svg id="l2radar" class="l2-svg" style="height:248px"></svg></div>
       <div class="radar-note"><span class="dot"></span>${cfg.note}</div>`;
    const svg=document.getElementById("l2radar"), w=svg.clientWidth||340, h=248;
    svg.setAttribute("viewBox",`0 0 ${w} ${h}`); svg.innerHTML="";
    const cx=w/2, cy=h/2-4, R=80, n=cfg.axes.length;
    const ang=i=>-Math.PI/2 + i*2*Math.PI/n;
    const pt=(i,rad)=>[cx+rad*Math.cos(ang(i)), cy+rad*Math.sin(ang(i))];
    // rings
    [0.25,0.5,0.75,1].forEach(f=>{ let p=""; for(let i=0;i<n;i++){const[x,y]=pt(i,R*f); p+=(i?"L":"M")+x.toFixed(1)+" "+y.toFixed(1)+" ";} p+="Z";
      svg.appendChild(el("path",{d:p,fill:"none",stroke:C("--line"),"stroke-width":1})); });
    // spokes
    for(let i=0;i<n;i++){ const[x,y]=pt(i,R); svg.appendChild(el("line",{x1:cx,y1:cy,x2:x,y2:y,stroke:C("--line-2"),"stroke-width":1})); }
    // norma ring
    let np=""; for(let i=0;i<n;i++){const[x,y]=pt(i,R*cfg.norma/100); np+=(i?"L":"M")+x.toFixed(1)+" "+y.toFixed(1)+" ";} np+="Z";
    svg.appendChild(el("path",{d:np,fill:"none",stroke:C("--amber-d"),"stroke-width":1.5,"stroke-dasharray":"4 3"}));
    // series
    const col=baseColor(cfg.series.color); let sp="";
    for(let i=0;i<n;i++){const[x,y]=pt(i,R*cfg.series.data[i]/100); sp+=(i?"L":"M")+x.toFixed(1)+" "+y.toFixed(1)+" ";} sp+="Z";
    svg.appendChild(el("path",{d:sp,fill:col,"fill-opacity":.16,stroke:col,"stroke-width":2.2,"stroke-linejoin":"round"}));
    for(let i=0;i<n;i++){const[x,y]=pt(i,R*cfg.series.data[i]/100); svg.appendChild(el("circle",{cx:x,cy:y,r:3,fill:"#fff",stroke:col,"stroke-width":2}));}
    // labels
    for(let i=0;i<n;i++){ const[x,y]=pt(i,R+15); const a=ang(i); const anchor=Math.abs(Math.cos(a))<.3?"middle":(Math.cos(a)>0?"start":"end");
      const t=el("text",{x:x.toFixed(1),y:(y+3).toFixed(1),"text-anchor":anchor,fill:C("--ink-2"),"font-size":10,"font-weight":600,"font-family":"var(--font)"}); t.textContent=cfg.axes[i]; svg.appendChild(t); }
  }

  /* ============================================================
     LEVEL 3 · GANTT
     ============================================================ */
  function renderGantt(g) {
    document.getElementById("ganttTitle").textContent=g.title;
    document.getElementById("ganttSub").textContent=g.sub;
    document.getElementById("ganttCol").lastChild.textContent=g.col;
    const rows=document.getElementById("ganttRows");
    const keep=rows.querySelectorAll(".gantt-grid-lines, .gtl-today");
    rows.innerHTML=""; keep.forEach(k=>rows.appendChild(k));
    g.rows.forEach(rw=>{ const segs=rw.bar.segs.map(s=>`<span class="gseg gseg-${s.t}" style="width:${s.w}%"></span>`).join("");
      const miles=(rw.miles||[]).map(m=>`<div class="gmile" style="left:${m}%"></div>`).join("");
      const div=document.createElement("div"); div.className="grow";
      div.innerHTML=`<div class="glabel"><span class="gl-ico ico-${rw.tone}">${svgIco(rw.ico)}</span><span class="gl-txt"><b>${rw.title}</b><span>${rw.sub}</span></span><span class="gl-own">${rw.own}</span></div>
        <div class="gtrack"><div class="gbar${rw.bar.plan?' plan-bar':''}" style="left:${rw.bar.left}%;width:${rw.bar.width}%">${segs}<span class="gpct${rw.bar.pctBad?' bad':''}">${rw.bar.pct}</span></div>${miles}</div>`;
      rows.appendChild(div); });
  }
  function ganttLines() { const host=document.getElementById("ganttLines"); host.style.gridTemplateColumns="repeat(16, 1fr)"; host.innerHTML=""; for(let i=0;i<16;i++) host.appendChild(document.createElement("i")); }

  /* ============================================================
     ORCHESTRATION
     ============================================================ */
  const MAIN = { combo: mainCombo, area: mainArea, matrix: mainMatrix, sankey: mainSankey };
  const SIDE = { donut: sideDonut, table: sideTable, groupbars: sideGroupbars, radar: sideRadar };

  function renderAll(key) {
    const d = window.DATA[key];
    document.getElementById("ctxLabel").textContent = d.context;
    renderKpis(d.kpis);
    const mainCard = document.getElementById("mainCard"), sideCard = document.getElementById("sideCard");
    const mt = (d.main && d.main.type) || "combo", st = (d.side && d.side.type) || "donut";
    sideCard.className = "card side-panel";
    (MAIN[mt] || mainCombo)(mainCard, d);
    (SIDE[st] || sideDonut)(sideCard, d);
    renderGantt(d.gantt);
    ganttLines();
  }

  function switchTo(key, tabEl) {
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active")); tabEl.classList.add("active");
    const stage=document.getElementById("stage"); stage.classList.add("swap");
    setTimeout(()=>{ renderAll(key); stage.classList.remove("swap"); }, 240);
  }

  function init() {
    document.querySelectorAll(".tab").forEach(t=>{ const key=t.getAttribute("data-g");
      t.addEventListener("click",()=>{ if(window.DATA[key] && !t.classList.contains("active")) switchTo(key,t); }); });
    renderAll("g1");
    let rt; window.addEventListener("resize",()=>{ clearTimeout(rt); rt=setTimeout(()=>{ const a=document.querySelector(".tab.active"); renderAll(a?a.getAttribute("data-g"):"g1"); },180); });
  }
  if (document.readyState==="loading") document.addEventListener("DOMContentLoaded",init); else init();
})();

</script>

</body>

<script>
(function(){
  var DW = 1440;
  var iframe = document.getElementById("dash");
  var screenEl = document.querySelector(".screen");
  // Blob URL = execucao de scripts confiavel dentro do Framer (mais robusto que srcdoc)
  var htmlStr = document.getElementById("deskSrc").value;
  var blob = new Blob([htmlStr], {type:"text/html"});
  iframe.src = URL.createObjectURL(blob);
  function fit(){
    var w = screenEl.clientWidth, h = screenEl.clientHeight;
    if(!w||!h) return;
    var k = w / DW;
    iframe.style.width = DW + "px";
    iframe.style.height = (h / k) + "px";
    iframe.style.transform = "scale(" + k + ")";
  }
  if(window.ResizeObserver){ new ResizeObserver(fit).observe(screenEl); }
  window.addEventListener("resize", fit);
  iframe.addEventListener("load", fit);
  fit();
})();
</script>
